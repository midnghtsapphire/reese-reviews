# ============================================================
# Reese Reviews — CI Gate for Production Deploys
# ============================================================
# DigitalOcean App Platform handles the actual deploy via its
# native deploy_on_push trigger (configured in .do/app.yaml).
# This workflow exists ONLY to verify the build is healthy
# before/after that push happens.
#
# Required GitHub Secrets (synced from Doppler reese-reviews/prd):
#   - VITE_SUPABASE_URL
#   - VITE_SUPABASE_PUBLISHABLE_KEY
# ============================================================

name: Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
